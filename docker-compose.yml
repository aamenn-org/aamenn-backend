services:
  api:
    build: .
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=aamenn_vault
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - B2_APPLICATION_KEY_ID=${B2_APPLICATION_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_ID=${B2_BUCKET_ID}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - VAULT_RESET_OTP_TTL_SECONDS=${VAULT_RESET_OTP_TTL_SECONDS}
      - VAULT_RESET_SESSION_TTL_SECONDS=${VAULT_RESET_SESSION_TTL_SECONDS}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - IP_LOOKUP_ENABLED=${IP_LOOKUP_ENABLED}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - PAYMOB_API_KEY=${PAYMOB_API_KEY}
      - PAYMOB_PUBLIC_KEY=${PAYMOB_PUBLIC_KEY}
      - PAYMOB_SECRET_KEY=${PAYMOB_SECRET_KEY}
      - PAYMOB_HMAC_SECRET=${PAYMOB_HMAC_SECRET}
      - PAYMOB_CARD_INTEGRATION_ID=${PAYMOB_CARD_INTEGRATION_ID}
      - PAYMOB_WALLET_INTEGRATION_ID=${PAYMOB_WALLET_INTEGRATION_ID}
      - PAYMOB_FAWRY_INTEGRATION_ID=${PAYMOB_FAWRY_INTEGRATION_ID}
      - PAYMOB_CALLBACK_URL=${PAYMOB_CALLBACK_URL}
      - PAYMOB_REDIRECT_URL=${PAYMOB_REDIRECT_URL}
      - GRACE_PERIOD_DAYS=${GRACE_PERIOD_DAYS}
      - INSTAPAY_ENABLED=${INSTAPAY_ENABLED}
      - INSTAPAY_USERNAME=${INSTAPAY_USERNAME}
      - INSTAPAY_STALE_HOURS=${INSTAPAY_STALE_HOURS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/users/me 2>&1 | grep -q 401']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=aamenn_vault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    external: true
    name: aamenn_postgres_data
