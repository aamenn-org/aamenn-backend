name: Deploy Backend to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/aamenn-backend
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart API using docker compose
            # (reads .env from disk, inherits port bindings, resource limits, healthchecks)
            docker compose build api
            docker compose up -d --force-recreate api

            # Wait for API to pass healthcheck
            sleep 15

            # Verify healthy
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep api
            docker logs --tail=30 aamenn-backend-api-1
            echo "Backend deployed successfully: $(git rev-parse --short HEAD)"
